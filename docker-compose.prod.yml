services:

  # ─── Ingestor ─────────────────────────────────────────────────
  ingestor:
    container_name: fsight-ingestor
    build:
      context: ./app
      dockerfile: Dockerfile.ingestor
    restart: always
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - docs:/app/docs
    networks:
      - backend-network

  # ─── FastAPI ──────────────────────────────────────────────────
  api:
    container_name: fsight-api
    build:
      context: ./app
      dockerfile: Dockerfile.api
    restart: always
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    networks:
      - frontend-network
      - backend-network

  # ─── Vue.js Frontend (nginx) ───────────────────────────────────
  frontend:                                                                
    container_name: fsight-frontend                                        
    build:                                                                 
      context: ./frontend                                                  
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "8082:80"  
    depends_on:
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/fsight.conf:ro
    networks:
      - frontend-network

  # ─── Vector Database ──────────────────────────────────────────
  qdrant:
    container_name: fsight-qdrant
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - backend-network

volumes:
  qdrant_data:
  docs:

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
