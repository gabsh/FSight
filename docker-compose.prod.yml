services:

  # ─── Ingestor ─────────────────────────────────────────────────
  ingestor:
    container_name: fsight-ingestor
    build:
      context: ./app
      dockerfile: Dockerfile.ingestor
    restart: always
    depends_on:
      qdrant:
        condition: service_started
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - docs:/app/docs
    networks:
      - fsight-network

  # ─── FastAPI ──────────────────────────────────────────────────
  api:
    container_name: fsight-api
    build:
      context: ./app
      dockerfile: Dockerfile.api
    restart: always
    depends_on:
      qdrant:
        condition: service_started
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    networks:
      - fsight-network

  # ─── Vue.js Frontend (nginx) ───────────────────────────────────
  frontend:
    container_name: fsight-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/fsight.conf:ro
    networks:
      - fsight-network

  # ─── Vector Database ──────────────────────────────────────────
  qdrant:
    container_name: fsight-qdrant
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - fsight-network

volumes:
  qdrant_data:
  docs:

networks:
  fsight-network:
    driver: bridge
