name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.api
          push: true
          tags: gabinn/fsight-api:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: gabinn/fsight-frontend:latest

      - name: Build and push Ingestor
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.ingestor
          push: true
          tags: gabinn/fsight-ingestor:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd ~/FSight
            git pull origin main
            sudo kubectl apply -f k8s/
            sudo kubectl rollout restart deployment/api -n fsight
            sudo kubectl rollout restart deployment/frontend -n fsight
