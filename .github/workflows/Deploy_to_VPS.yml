name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.api
          push: true
          tags: gabinn/fsight-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: gabinn/fsight-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push Ingestor
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.ingestor
          push: true
          tags: gabinn/fsight-ingestor:latest
          cache-from: type=gha,scope=ingestor
          cache-to: type=gha,mode=max,scope=ingestor

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 2222
          script: |
            cd ~/FSight
            git pull origin main
            sudo kubectl apply -f k8s/
            sudo kubectl rollout restart deployment/api -n fsight
            sudo kubectl rollout restart deployment/frontend -n fsight
