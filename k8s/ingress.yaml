apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fsight-ingress
  namespace: fsight
  annotations:
    # Pour k3s (Traefik) : remplacer nginx par traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Passer à "false" pour tester en local sans cert-manager
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - fsight.fr
        - www.fsight.fr
      secretName: fsight-tls
  rules:
    - host: fsight.fr
      http:
        paths:
          - path: /search
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /dates
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: www.fsight.fr
      http:
        paths:
          - path: /search
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /dates
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
