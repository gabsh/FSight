# ── Block 1 : HTTP → HTTPS redirect ─────────────────────────────────────────
# Any plain-HTTP request arriving on port 80 is permanently redirected (301)
# to the equivalent HTTPS URL.  This ensures all traffic is encrypted.
server {
    listen 80;
    server_name fsight.fr;
    return 301 https://$host$request_uri;
}


# ── Block 2 : Main HTTPS server ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name fsight.fr;

    # ── TLS / SSL ────────────────────────────────────────────────────────────
    # Certificate chain and private key managed by Certbot / Let's Encrypt.
    # The /etc/letsencrypt volume is mounted read-only from the host
    # (see docker-compose.prod.yml).
    ssl_certificate     /etc/letsencrypt/live/fsight.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fsight.fr/privkey.pem;

    # ── Static Vue / SPA files ───────────────────────────────────────────────
    # The Vue 3 build output (dist/) is copied into this directory by the
    # multi-stage Dockerfile.prod during the image build.
    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback: if the requested path is not a real file or directory,
    # serve index.html so that Vue Router can handle client-side routing.
    # Without this, refreshing a non-root URL would return a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── /search  →  FastAPI reverse proxy ───────────────────────────────────
    # Requests to /search are forwarded to the "api" Docker service on
    # port 8000.  nginx acts as a reverse proxy so the browser never talks
    # directly to FastAPI.
    location /search {
        proxy_pass         http://api:8000/search;
        proxy_http_version 1.1;

        # Forward the original Host header so the backend knows the public hostname.
        proxy_set_header   Host              $host;
        # Forward the real client IP (useful for logging / rate-limiting).
        proxy_set_header   X-Real-IP         $remote_addr;
        # Append the client IP to the forwarding chain (supports multiple proxies).
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Tell the backend that the original request was HTTPS.
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass through the rate-limit header set by the API so the frontend
        # can display how many requests are remaining.
        proxy_pass_header  X-RateLimit-Remaining;

        # The RAG pipeline (embedding + vector search + LLM call) can take
        # several seconds, so timeouts are set generously.
        proxy_read_timeout    60s;  # wait up to 60 s for the backend to respond
        proxy_connect_timeout 10s;  # wait up to 10 s to establish the connection
    }

    # ── /dates  →  FastAPI reverse proxy ────────────────────────────────────
    # Forwards requests to the /dates endpoint of the API, which returns the
    # list of available filing years for each ticker.
    location /dates {
        proxy_pass         http://api:8000/dates;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    # Prevent the page from being embedded in an iframe on another origin
    # (protects against clickjacking).
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    # Stop browsers from sniffing the content-type (prevents MIME confusion attacks).
    add_header X-Content-Type-Options "nosniff"                         always;
    # Only send the full Referer when navigating within the same origin;
    # send just the origin for cross-origin navigations.
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
