server {
    listen 80;
    server_name _;

    # ── Static Vue files ──────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: toutes les routes non-asset retournent index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    location /search {
        proxy_pass         http://api:8000/search;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Transmet le header rate-limit lu par api.js
        proxy_pass_header  X-RateLimit-Remaining;

        # Timeouts — le pipeline RAG peut prendre quelques secondes
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── Dates endpoint ───────────────────────────────────────────────────────
    location /dates {
        proxy_pass         http://api:8000/dates;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
