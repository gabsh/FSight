# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
#
# Any plain HTTP request arriving on port 80 is immediately redirected (301
# Moved Permanently) to the same URL but over HTTPS.  This ensures all traffic
# is encrypted and prevents accidental data leaks over an unencrypted channel.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name fsight.fr;
    return 301 https://$host$request_uri;
}


# ─────────────────────────────────────────────────────────────────────────────
# Main HTTPS server block
#
# Handles all real traffic.  It has three responsibilities:
#   1. Serve the compiled Vue 3 SPA (static files).
#   2. Reverse-proxy API requests to the FastAPI backend container.
#   3. Add security headers to every response.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name fsight.fr;

    # ── TLS certificate (Let's Encrypt / Certbot) ─────────────────────────────
    # fullchain.pem  → the server certificate + any intermediate CA certificates.
    # privkey.pem    → the private key that matches the certificate.
    # Both files are managed by Certbot and mounted read-only into the container
    # via the docker-compose volume: /etc/letsencrypt:/etc/letsencrypt:ro
    ssl_certificate     /etc/letsencrypt/live/fsight.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fsight.fr/privkey.pem;

    # ── Static Vue files ──────────────────────────────────────────────────────
    # The Vue app is built with `npm run build` inside the Docker image
    # (Dockerfile.prod) and the resulting dist/ folder is copied to the nginx
    # default HTML root.
    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback — Vue Router uses the HTML5 History API, so any path that
    # does not match a real file on disk (e.g. /about, /search) must return
    # index.html so the client-side router can take over.
    # try_files tries: the exact URI → the URI as a directory → falls back to /index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── /search — RAG query endpoint ─────────────────────────────────────────
    # Forwards POST /search requests to the FastAPI container (service name
    # "api", port 8000, on the shared Docker "frontend-network").
    #
    # proxy_http_version 1.1        — use HTTP/1.1 for keep-alive support.
    # proxy_set_header Host         — pass the original Host header so the
    #                                 backend knows which domain was requested.
    # proxy_set_header X-Real-IP    — forward the client's real IP address.
    # proxy_set_header X-Forwarded-For
    #                               — append the client IP to the standard
    #                                 proxy chain header (useful for logging).
    # proxy_set_header X-Forwarded-Proto
    #                               — tell the backend whether the original
    #                                 request arrived over HTTP or HTTPS.
    # proxy_pass_header X-RateLimit-Remaining
    #                               — allow the backend's rate-limit response
    #                                 header to pass through to the browser so
    #                                 api.js can display it in the UI.
    # proxy_read_timeout 60s        — the RAG pipeline (embedding + reranking +
    #                                 LLM call) can take several seconds; 60 s
    #                                 prevents nginx from closing the connection
    #                                 before the answer arrives.
    # proxy_connect_timeout 10s     — maximum time allowed to establish the
    #                                 TCP connection to the backend.
    location /search {
        proxy_pass         http://api:8000/search;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_pass_header  X-RateLimit-Remaining;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── /dates — available filing dates endpoint ──────────────────────────────
    # Lightweight GET endpoint used by the frontend to populate the date picker.
    # Same proxy headers as /search; no extended timeout is needed because this
    # call only queries Qdrant metadata and returns quickly.
    location /dates {
        proxy_pass         http://api:8000/dates;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    # X-Frame-Options: SAMEORIGIN   — blocks the page from being embedded in an
    #                                 <iframe> on a different origin, mitigating
    #                                 clickjacking attacks.
    # X-Content-Type-Options: nosniff
    #                               — prevents browsers from MIME-sniffing a
    #                                 response away from the declared Content-Type,
    #                                 reducing drive-by-download risks.
    # Referrer-Policy               — sends the full URL only when navigating
    #                                 within the same origin; sends only the
    #                                 origin (no path) for cross-origin requests,
    #                                 limiting information leakage via the Referer
    #                                 header.
    # "always"                      — applies the header even on error responses
    #                                 (4xx / 5xx), not just on successful ones.
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
